name: Global Indices

on:
  workflow_dispatch:

concurrency:
  group: global-indices
  cancel-in-progress: true

jobs:
  global-indices:
    name: '해외지수 수집 (평일 매 15분)'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dart-financial-collector
        uses: actions/checkout@v4
        with:
          repository: jude0610/dart-financial-collector
          token: ${{ secrets.PRIVATE_REPO_PAT }}

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci --omit=dev
        working-directory: server

      - name: SSH 키 설정
        env:
          SSH_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
          SSH_HOST: ${{ secrets.HOSTINGER_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 65002 "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: LS증권 해외지수 수집
        env:
          LS_APP_KEY: ${{ secrets.LS_APP_KEY }}
          LS_APP_SECRET: ${{ secrets.LS_APP_SECRET }}
        run: node collect-and-push-global.js > /tmp/global.json
        working-directory: server

      - name: DB 저장 (SSH pipe)
        env:
          SSH_USER: ${{ secrets.HOSTINGER_USER }}
          SSH_HOST: ${{ secrets.HOSTINGER_HOST }}
        run: |
          # 체크아웃된 import-global.js를 base64로 인코딩 후 SSH로 전달
          # → Hostinger 파일 상태(배포 타이밍, git reset 여부)와 완전히 무관
          SCRIPT_B64=$(base64 -w 0 server/import-global.js)
          DATA_B64=$(base64 -w 0 /tmp/global.json)
          ssh -p 65002 -o BatchMode=yes "$SSH_USER@$SSH_HOST" "
            for f in ~/domains/*/public_html/.builds/config/.env; do
              [ -f \"\$f\" ] && { set -a; . \"\$f\"; set +a; break; }
            done
            echo '${SCRIPT_B64}' | base64 -d > /tmp/ig_run.js
            cd ~/domains/quantnova.co.kr/nodejs/server
            echo '${DATA_B64}' | base64 -d | /opt/alt/alt-nodejs18/root/bin/node /tmp/ig_run.js
            rm -f /tmp/ig_run.js
          "
