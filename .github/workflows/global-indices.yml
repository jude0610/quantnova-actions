name: Global Indices

on:
  workflow_dispatch:

concurrency:
  group: global-indices
  cancel-in-progress: true

jobs:
  global-indices:
    name: '해외지수 수집 (평일 매 15분)'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dart-financial-collector
        uses: actions/checkout@v4
        with:
          repository: jude0610/dart-financial-collector
          token: ${{ secrets.PRIVATE_REPO_PAT }}

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci --omit=dev
        working-directory: server

      - name: LS증권 해외지수 수집
        env:
          LS_APP_KEY: ${{ secrets.LS_APP_KEY }}
          LS_APP_SECRET: ${{ secrets.LS_APP_SECRET }}
        run: node collect-and-push-global.js > /tmp/global.json
        working-directory: server

      - name: DB 저장
        env:
          INTERNAL_API_TOKEN: ${{ secrets.INTERNAL_API_TOKEN }}
        run: |
          # SSH 대신 토큰 보호 HTTPS 엔드포인트로 저장 (Hostinger SSH 차단 우회).
          # 브라우저 User-Agent + 상태코드/본문 출력으로 WAF 403 등 진단.
          http=$(curl -sS \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" \
            --retry 3 --retry-delay 5 --retry-all-errors --connect-timeout 15 --max-time 60 \
            -H "x-internal-token: $INTERNAL_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data-binary @/tmp/global.json \
            -o /tmp/resp.txt -w '%{http_code}' \
            "https://quantnova.co.kr/api/internal/import-global")
          echo "HTTP $http"; cat /tmp/resp.txt; echo
          if [ "$http" -lt 200 ] || [ "$http" -ge 300 ]; then exit 1; fi
