name: DART 재무제표 수집

on:
  schedule:
    - cron: '0 16 * * 1-5'  # KST 01:00 화~토
  workflow_dispatch:

jobs:
  dart-financials-daily:
    name: 'DART 재무제표 수집 (KST 01:00 화~토, Step 1+2)'
    runs-on: ubuntu-latest
    steps:
      - name: SSH — run-task.js dart-financials-daily
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: 65002
          command_timeout: 240m
          script: |
            export TZ=Asia/Seoul
            for f in ~/domains/*/public_html/.builds/config/.env; do
              [ -f "$f" ] && { set -a; . "$f"; set +a; break; }
            done
            cd ~/domains/quantnova.co.kr/nodejs/server
            /opt/alt/alt-nodejs18/root/bin/node run-task.js dart-financials-daily