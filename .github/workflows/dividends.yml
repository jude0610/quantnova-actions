name: 배당 수집

on:
  schedule:
    - cron: '0 17 * * 1-5'  # KST 02:00 화~토
  workflow_dispatch:

jobs:
  dividends:
    name: '배당 수집 (KST 02:00 화~토)'
    runs-on: ubuntu-latest
    steps:
      - name: SSH — run-task.js dividends
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: 65002
          command_timeout: 120m
          script: |
            export TZ=Asia/Seoul
            for f in ~/domains/*/public_html/.builds/config/.env; do
              [ -f "$f" ] && { set -a; . "$f"; set +a; echo "✅ env loaded: $f"; break; }
            done
            cd ~/domains/quantnova.co.kr/nodejs/server
            /opt/alt/alt-nodejs18/root/bin/node run-task.js dividends > /dev/null 2>&1
