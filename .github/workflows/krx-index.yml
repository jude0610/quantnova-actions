name: KRX 지수 파이프라인

on:
  schedule:
    - cron: '25 23 * * 1-5'  # KST 08:25 화~토
  workflow_dispatch:

jobs:
  krx-index:
    name: 'KRX 지수 파이프라인 (KST 08:25 화~토)'
    runs-on: ubuntu-latest
    steps:
      - name: SSH — run-task.js krx-index
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: 65002
          command_timeout: 60m
          script: |
            export TZ=Asia/Seoul
            for f in ~/domains/*/public_html/.builds/config/.env; do
              [ -f "$f" ] && { set -a; . "$f"; set +a; break; }
            done
            cd ~/domains/quantnova.co.kr/nodejs/server
            /opt/alt/alt-nodejs18/root/bin/node run-task.js krx-index > /dev/null 2>&1
