name: DART 기업정보

on:
  schedule:
    - cron: '15 23 * * 1-5'
  workflow_dispatch:

jobs:
  dart-companies:
    name: 'DART 기업정보 (KST 08:15 화~토)'
    runs-on: ubuntu-latest
    steps:
      - name: Run task
        env:
          SSH_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
          SSH_HOST: ${{ secrets.HOSTINGER_HOST }}
          SSH_USER: ${{ secrets.HOSTINGER_USER }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 65002 "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -p 65002 -o BatchMode=yes "$SSH_USER@$SSH_HOST" 'bash ~/domains/*/nodejs/server/scripts/qn-task.sh dart-companies'
