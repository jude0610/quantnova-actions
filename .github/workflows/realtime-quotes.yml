name: Realtime Quotes

on:
  workflow_dispatch:

concurrency:
  group: realtime-quotes
  cancel-in-progress: true

jobs:
  realtime-quotes:
    name: '지연시세 수집 (KST 08:00~20:10, 15분 간격)'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dart-financial-collector
        uses: actions/checkout@v4
        with:
          repository: jude0610/dart-financial-collector
          token: ${{ secrets.PRIVATE_REPO_PAT }}

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci --omit=dev
        working-directory: server

      - name: 종목 코드 조회
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          INTERNAL_API_TOKEN: ${{ secrets.INTERNAL_API_TOKEN }}
        run: |
          # SSH 대신 토큰 보호 HTTPS 엔드포인트로 조회 (Hostinger SSH 차단 우회).
          # curl 자체 재시도(--retry)로 일시 오류 자동 회복.
          curl -fsS --retry 3 --retry-delay 5 --retry-all-errors \
            --connect-timeout 15 --max-time 60 \
            -H "x-internal-token: $INTERNAL_API_TOKEN" \
            "$APP_BASE_URL/api/internal/stock-codes" -o /tmp/codes.json

      - name: LS증권 시세 수집
        env:
          LS_APP_KEY: ${{ secrets.LS_APP_KEY }}
          LS_APP_SECRET: ${{ secrets.LS_APP_SECRET }}
        run: node collect-and-push-quotes.js /tmp/codes.json > /tmp/quotes.json
        working-directory: server

      - name: DB 저장
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          INTERNAL_API_TOKEN: ${{ secrets.INTERNAL_API_TOKEN }}
        run: |
          curl -fsS --retry 3 --retry-delay 5 --retry-all-errors \
            --connect-timeout 15 --max-time 120 \
            -H "x-internal-token: $INTERNAL_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data-binary @/tmp/quotes.json \
            "$APP_BASE_URL/api/internal/import-quotes"
