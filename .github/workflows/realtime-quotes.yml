name: Realtime Quotes

on:
  workflow_dispatch:

concurrency:
  group: realtime-quotes
  cancel-in-progress: true

jobs:
  realtime-quotes:
    name: '지연시세 수집 (KST 08:00~20:10, 15분 간격)'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dart-financial-collector
        uses: actions/checkout@v4
        with:
          repository: jude0610/dart-financial-collector
          token: ${{ secrets.PRIVATE_REPO_PAT }}

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci --omit=dev
        working-directory: server

      - name: SSH 키 설정
        env:
          SSH_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
          SSH_HOST: ${{ secrets.HOSTINGER_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 65002 "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: 종목 코드 조회
        env:
          SSH_USER: ${{ secrets.HOSTINGER_USER }}
          SSH_HOST: ${{ secrets.HOSTINGER_HOST }}
        run: |
          # SSH 일시 연결 실패(exit 255) 대비 재시도 (최대 3회, 백오프)
          for attempt in 1 2 3; do
            if ssh -p 65002 -o BatchMode=yes -o ConnectTimeout=15 -o ServerAliveInterval=10 -o ServerAliveCountMax=3 "$SSH_USER@$SSH_HOST" 'bash ~/domains/*/nodejs/server/scripts/qn-task.sh get-stock-codes' > /tmp/codes.json; then
              exit 0
            fi
            echo "SSH attempt $attempt failed, retrying in $((attempt * 5))s..." >&2
            sleep $((attempt * 5))
          done
          echo "SSH failed after 3 attempts" >&2
          exit 1

      - name: LS증권 시세 수집
        env:
          LS_APP_KEY: ${{ secrets.LS_APP_KEY }}
          LS_APP_SECRET: ${{ secrets.LS_APP_SECRET }}
        run: node collect-and-push-quotes.js /tmp/codes.json > /tmp/quotes.json
        working-directory: server

      - name: DB 저장
        env:
          SSH_USER: ${{ secrets.HOSTINGER_USER }}
          SSH_HOST: ${{ secrets.HOSTINGER_HOST }}
        run: |
          # SSH 일시 연결 실패(exit 255) 대비 재시도 (최대 3회, 백오프). 재시도 시
          # 입력을 다시 읽도록 파이프 대신 파일 리다이렉트(< 파일) 사용
          for attempt in 1 2 3; do
            if ssh -p 65002 -o BatchMode=yes -o ConnectTimeout=15 -o ServerAliveInterval=10 -o ServerAliveCountMax=3 "$SSH_USER@$SSH_HOST" 'bash ~/domains/*/nodejs/server/scripts/qn-task.sh import-quotes' < /tmp/quotes.json; then
              exit 0
            fi
            echo "SSH attempt $attempt failed, retrying in $((attempt * 5))s..." >&2
            sleep $((attempt * 5))
          done
          echo "SSH failed after 3 attempts" >&2
          exit 1
