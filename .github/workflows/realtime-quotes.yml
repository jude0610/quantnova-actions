name: Realtime Quotes

on:
  workflow_dispatch:

concurrency:
  group: realtime-quotes
  cancel-in-progress: true

jobs:
  realtime-quotes:
    name: '지연시세 수집 (KST 08:00~20:10, 15분 간격)'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dart-financial-collector
        uses: actions/checkout@v4
        with:
          repository: jude0610/dart-financial-collector
          token: ${{ secrets.PRIVATE_REPO_PAT }}

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci --omit=dev
        working-directory: server

      - name: 종목 코드 조회
        env:
          INTERNAL_API_TOKEN: ${{ secrets.INTERNAL_API_TOKEN }}
        run: |
          # SSH 대신 토큰 보호 HTTPS 엔드포인트로 조회 (Hostinger SSH 차단 우회).
          # 브라우저 User-Agent 사용 (WAF가 기본 curl UA를 403으로 막는 경우 대비).
          # 실패 시 상태코드+응답 본문을 출력해 원인(WAF 403 vs 앱 4xx/5xx) 진단.
          http=$(curl -sS \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" \
            --retry 3 --retry-delay 5 --retry-all-errors --connect-timeout 15 --max-time 60 \
            -H "x-internal-token: $INTERNAL_API_TOKEN" \
            -o /tmp/codes.json -w '%{http_code}' \
            "https://quantnova.co.kr/api/internal/stock-codes")
          echo "HTTP $http"
          if [ "$http" -lt 200 ] || [ "$http" -ge 300 ]; then
            echo "응답 본문(앞 1000자):"; head -c 1000 /tmp/codes.json; echo
            exit 1
          fi

      - name: LS증권 시세 수집
        env:
          LS_APP_KEY: ${{ secrets.LS_APP_KEY }}
          LS_APP_SECRET: ${{ secrets.LS_APP_SECRET }}
        run: node collect-and-push-quotes.js /tmp/codes.json > /tmp/quotes.json
        working-directory: server

      - name: DB 저장
        env:
          INTERNAL_API_TOKEN: ${{ secrets.INTERNAL_API_TOKEN }}
        run: |
          http=$(curl -sS \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" \
            --retry 3 --retry-delay 5 --retry-all-errors --connect-timeout 15 --max-time 120 \
            -H "x-internal-token: $INTERNAL_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data-binary @/tmp/quotes.json \
            -o /tmp/resp.txt -w '%{http_code}' \
            "https://quantnova.co.kr/api/internal/import-quotes")
          echo "HTTP $http"; cat /tmp/resp.txt; echo
          if [ "$http" -lt 200 ] || [ "$http" -ge 300 ]; then exit 1; fi
