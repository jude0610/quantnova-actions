name: 탈퇴 계정 정리

on:
  schedule:
    - cron: '30 18 * * *'
  workflow_dispatch:

jobs:
  cleanup-accounts:
    name: '탈퇴 계정 정리 (KST 03:30 매일)'
    runs-on: ubuntu-latest
    steps:
      - name: Run task
        env:
          SSH_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
          SSH_HOST: ${{ secrets.HOSTINGER_HOST }}
          SSH_USER: ${{ secrets.HOSTINGER_USER }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 65002 "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -p 65002 -o BatchMode=yes "$SSH_USER@$SSH_HOST" 'bash ~/domains/*/nodejs/server/scripts/qn-task.sh cleanup-accounts'
