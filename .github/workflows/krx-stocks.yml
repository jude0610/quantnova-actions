name: KRX 종목 기본정보

on:
  schedule:
    - cron: '10 23 * * 1-5'  # KST 08:10 화~토
  workflow_dispatch:

jobs:
  krx-stocks:
    name: 'KRX 종목 기본정보 (KST 08:10 화~토)'
    runs-on: ubuntu-latest
    steps:
      - name: SSH — run-task.js krx-stocks
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: 65002
          command_timeout: 15m
          script: |
            export TZ=Asia/Seoul
            for f in ~/domains/*/public_html/.builds/config/.env; do
              [ -f "$f" ] && { set -a; . "$f"; set +a; echo "✅ env loaded: $f"; break; }
            done
            cd ~/domains/quantnova.co.kr/nodejs/server
            /opt/alt/alt-nodejs18/root/bin/node run-task.js krx-stocks
