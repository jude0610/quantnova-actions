name: 재무지표 가공

on:
  schedule:
    - cron: '0 19 * * 1-5'  # KST 04:00 화~토
  workflow_dispatch:

jobs:
  dart-financials-process:
    name: '재무지표 가공 (KST 04:00 화~토, 증분)'
    runs-on: ubuntu-latest
    steps:
      - name: SSH — run-task.js dart-financials-process
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: 65002
          command_timeout: 90m
          script: |
            export TZ=Asia/Seoul
            for f in ~/domains/*/public_html/.builds/config/.env; do
              [ -f "$f" ] && { set -a; . "$f"; set +a; break; }
            done
            cd ~/domains/quantnova.co.kr/nodejs/server
            /opt/alt/alt-nodejs18/root/bin/node run-task.js dart-financials-process