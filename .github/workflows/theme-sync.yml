name: Theme Sync

# LS증권 테마 분류·종목 매핑 동기화 (주 1회 권장)
# LS API는 Hostinger IP 차단 → GitHub Actions VM에서 수집 후 SSH pipe로 DB 저장.
# t1532를 종목당 1.1초 간격으로 호출하므로 ~48분 소요.

on:
  workflow_dispatch:
  schedule:
    # 매주 토요일 KST 06:00 (UTC 금요일 21:00)
    - cron: '0 21 * * 5'

concurrency:
  group: theme-sync
  cancel-in-progress: false

jobs:
  theme-sync:
    name: 'LS 테마 동기화 (전체 종목 ~48분)'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout dart-financial-collector
        uses: actions/checkout@v4
        with:
          repository: jude0610/dart-financial-collector
          token: ${{ secrets.PRIVATE_REPO_PAT }}

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci --omit=dev
        working-directory: server

      - name: SSH 키 설정
        env:
          SSH_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
          SSH_HOST: ${{ secrets.HOSTINGER_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 65002 "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: 종목 코드 조회
        env:
          SSH_USER: ${{ secrets.HOSTINGER_USER }}
          SSH_HOST: ${{ secrets.HOSTINGER_HOST }}
        run: |
          ssh -p 65002 -o BatchMode=yes "$SSH_USER@$SSH_HOST" 'bash ~/domains/*/nodejs/server/scripts/qn-task.sh get-stock-codes' > /tmp/codes.json

      - name: LS증권 테마 수집
        env:
          LS_APP_KEY: ${{ secrets.LS_APP_KEY }}
          LS_APP_SECRET: ${{ secrets.LS_APP_SECRET }}
        run: node collect-and-push-themes.js /tmp/codes.json > /tmp/themes.json
        working-directory: server

      - name: DB 저장
        env:
          SSH_USER: ${{ secrets.HOSTINGER_USER }}
          SSH_HOST: ${{ secrets.HOSTINGER_HOST }}
        run: |
          cat /tmp/themes.json | ssh -p 65002 -o BatchMode=yes "$SSH_USER@$SSH_HOST" 'bash ~/domains/*/nodejs/server/scripts/qn-task.sh import-themes'
