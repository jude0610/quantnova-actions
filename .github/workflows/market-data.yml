name: Market Data

on:
  workflow_dispatch:

concurrency:
  group: market-data
  cancel-in-progress: true

jobs:
  market-data:
    name: '시장 데이터 수집 (KST 09:00~15:40, 15분 간격)'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dart-financial-collector
        uses: actions/checkout@v4
        with:
          repository: jude0610/dart-financial-collector
          token: ${{ secrets.PRIVATE_REPO_PAT }}

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci --omit=dev
        working-directory: server

      - name: LS증권 시장 데이터 수집
        env:
          LS_APP_KEY: ${{ secrets.LS_APP_KEY }}
          LS_APP_SECRET: ${{ secrets.LS_APP_SECRET }}
        run: node collect-and-push-market.js > /tmp/market.json
        working-directory: server

      - name: DB 저장
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          INTERNAL_API_TOKEN: ${{ secrets.INTERNAL_API_TOKEN }}
        run: |
          # SSH 대신 토큰 보호 HTTPS 엔드포인트로 저장 (Hostinger SSH 차단 우회).
          curl -fsS --retry 3 --retry-delay 5 --retry-all-errors \
            --connect-timeout 15 --max-time 120 \
            -H "x-internal-token: $INTERNAL_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data-binary @/tmp/market.json \
            "$APP_BASE_URL/api/internal/import-market"
